<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <meta name="description" content="RNG Scoring App - Track scores offline and sync online">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RNG Scores">
    <title>RNG Scoring App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Event selection overlay -->
    <div id="event-overlay" class="event-overlay" style="display:none">
        <div class="event-overlay-inner">
            <div class="event-overlay-header">
                <img src="icon-192.png" alt="RNG" class="event-logo">
                <h1>RNG Scoring</h1>
                <p>Select an event to continue</p>
            </div>
            <div id="event-cards" class="event-cards">
                <!-- Event cards rendered dynamically -->
            </div>
            <div class="event-create-section">
                <h3>Create New Event</h3>
                <input type="text" id="new-event-name" placeholder="Event name...">
                <input type="date" id="new-event-date">
                <input type="text" id="new-event-pin" placeholder="Admin PIN (optional)" inputmode="numeric">
                <button id="create-event-btn" class="btn-primary">Create Event</button>
            </div>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="header-info">
                <h1>RNG Scoring App</h1>
                <div id="active-event-bar" class="active-event-bar" style="display:none">
                    📋 <span id="active-event-name"></span>
                    <button id="change-event-btn" class="btn-change-event">Switch</button>
                </div>
            </div>
            <div class="status">
                <span id="online-status" class="status-indicator online">●</span>
                <span id="status-text">Online</span>
            </div>
        </header>

        <div id="install-banner" class="install-banner" style="display:none">
            <span id="install-message">📲 Install this app on your device for quick access!</span>
            <button id="install-btn" class="btn-install">Install</button>
            <button id="install-dismiss" class="btn-install-dismiss" aria-label="Dismiss">✕</button>
        </div>

        <main>
            <nav class="tab-bar">
                <button class="tab-btn active" data-tab="score-entry">Score Entry</button>
                <button class="tab-btn" data-tab="competitors">Competitors</button>
                <button class="tab-btn" data-tab="stages">Stages</button>
                <button class="tab-btn" data-tab="scores">Scores</button>
            </nav>

            <div id="tab-score-entry" class="tab-content active">
                <section class="score-entry">
                    <h2>Enter Score</h2>
                    <form id="score-form">
                        <div class="form-group">
                            <label for="stage">Stage</label>
                            <select id="stage" required>
                                <option value="" disabled selected>Select stage...</option>
                            </select>
                            <div id="stage-info-display" class="division-display"></div>
                        </div>
                        <div class="form-group">
                            <label for="player-name">Shooter</label>
                            <select id="player-name" required>
                                <option value="" disabled selected>Select shooter...</option>
                            </select>
                            <div id="shooter-division-display" class="division-display"></div>
                        </div>
                        <div id="dnf-group" class="form-group checkbox-group">
                            <label for="dnf" class="checkbox-label">
                                <input type="checkbox" id="dnf">
                                <span class="custom-checkbox"></span>
                                DNF (Did Not Finish)
                            </label>
                        </div>
                        <div id="time-row" class="form-group">
                            <label for="time">Time (seconds)</label>
                            <input type="number" id="time" step="0.01" min="0" required placeholder="0.00">
                        </div>
                        <div id="tnt-row" class="form-group" style="display:none">
                            <label for="targets-not-neutralized">Targets Not Neutralized</label>
                            <input type="number" id="targets-not-neutralized" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>Wait Time</label>
                            <div class="time-inputs">
                                <input type="number" id="wait-time-min" min="0" placeholder="0" class="time-part"> <span class="time-sep">m</span>
                                <input type="number" id="wait-time-sec" min="0" max="59" placeholder="00" class="time-part"> <span class="time-sep">s</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="notes">Notes (optional)</label>
                            <textarea id="notes" rows="2"></textarea>
                        </div>
                        <div id="form-error" class="form-error" style="display:none"></div>
                        <button type="submit" class="btn-primary">Save Score</button>
                    </form>
                </section>
            </div>

            <div id="tab-competitors" class="tab-content">
                <section class="competitors-mgmt">
                    <h2>Manage Competitors</h2>
                    <div class="add-competitor-form">
                        <input type="text" id="competitor-name-input" placeholder="Competitor name...">
                        <input type="text" id="competitor-division-input" placeholder="Division...">
                        <button type="button" id="add-competitor-btn" class="btn-primary">Add</button>
                    </div>
                    <div class="import-bar">
                        <label class="btn-import" for="import-excel-input">⬆ Import from Excel</label>
                        <input type="file" id="import-excel-input" accept=".xlsx,.xls" style="display:none">
                        <span class="import-hint">Column A: Name &nbsp;&middot;&nbsp; Column B: Division</span>
                    </div>
                    <div id="competitors-list">
                        <!-- Competitors will be populated here -->
                    </div>
                </section>
            </div>

            <div id="tab-stages" class="tab-content">
                <section class="competitors-mgmt">
                    <h2>Manage Stages</h2>
                    <div class="add-competitor-form">
                        <input type="text" id="stage-name-input" placeholder="Enter stage name...">
                        <input type="number" id="stage-targets-input" placeholder="# of targets" min="0" style="width:120px">
                        <input type="number" id="stage-par-input" placeholder="PAR time (s)" min="0" step="0.01" style="width:130px">
                        <button type="button" id="add-stage-mgmt-btn" class="btn-primary">Add</button>
                    </div>
                    <div id="stages-list">
                        <!-- Stages will be populated here -->
                    </div>
                </section>
            </div>

            <div id="tab-scores" class="tab-content">
                <section class="scores-list">
                    <h2>Recent Scores</h2>
                    <div class="sync-info">
                        <span id="pending-count">0</span> scores pending sync
                        <button id="sync-btn" class="btn-secondary">Sync Now</button>
                    </div>
                    <div class="export-bar">
                        <button id="export-excel-btn" class="btn-export">⬇ Export to Excel</button>
                    </div>
                    <div id="scores-container">
                        <!-- Scores will be populated here -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/events.js"></script>
    <script src="js/players.js"></script>
    <script src="js/stages.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/excel.js"></script>
    <script src="js/sync.js"></script>
    <script src="app.js"></script>
</body>
</html>
